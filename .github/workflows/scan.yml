name: Polymarket Weekly Scan

on:
  schedule:
    - cron: '0 18 * * 0'   # Every Sunday at 6pm UTC
  workflow_dispatch:         # Manual run from the GitHub Actions UI anytime

permissions:
  contents: write            # Needed to commit the market snapshot back to the repo
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  scan-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests openpyxl

      - name: Run scanner (with delta tracking from previous snapshot)
        run: |
          mkdir -p site
          python polymarket_scanner.py \
            --no-spreadsheet \
            --output-dir ./site \
            --days 90 \
            --previous-data data/previous_markets.json

      - name: Copy dashboard to site
        run: cp dashboard.html site/dashboard.html

      - name: Save market snapshot for next run's delta tracking
        run: |
          mkdir -p data
          cp site/markets.json data/previous_markets.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/previous_markets.json
          git diff --staged --quiet || git commit -m "chore: update market snapshot [skip ci]"
          git push

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
